<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI 코딩 도구 아티클 요약</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7fb;
      --panel: #ffffff;
      --text: #18202a;
      --muted: #5f6b7a;
      --line: #d8dee8;
      --link: #0a66c2;
      --accent: #e8f1fb;
      --warn: #fff3cd;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "Noto Sans KR", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
    }
    main {
      width: min(960px, calc(100vw - 32px));
      margin: 32px auto 64px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 32px;
    }
    h1, h2, h3 { line-height: 1.3; }
    a { color: var(--link); }
    .meta, .notice {
      padding: 12px 14px;
      border-radius: 12px;
      margin: 16px 0;
    }
    .meta { background: var(--accent); }
    .notice { background: var(--warn); }
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 20px 0;
    }
    th, td {
      border: 1px solid var(--line);
      padding: 10px;
      vertical-align: top;
      text-align: left;
    }
    .muted { color: var(--muted); }
  </style>
</head>
<body>
  <main>
    <h1>AI 코딩 도구 아티클 요약</h1>
    <div class="meta">
      <strong>생성일</strong>: 2026-04-15<br>
      <strong>조사 기준</strong>: 여기에 조사 기준 요약을 작성한다.
    </div>
    <h2>목차</h2>
    <p class="muted">본문 작성 후 목차 링크를 정리한다.</p>
    <h2>본문</h2>
    <p>여기에 본문을 작성한다.</p>
    <h2>핵심 요약</h2>
    <p>여기에 핵심 요약을 작성한다.</p>
    <h2>출처</h2>
    <p>여기에 출처 목록을 작성한다.</p>
  </main>
</body>
</html>
